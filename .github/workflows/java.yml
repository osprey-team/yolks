name: build java
on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 1 * *"
  push:
    branches:
      - master
    paths:
      - java/**

# Fix 1: Explicitly grant write access to GitHub Packages
permissions:
  contents: read
  packages: write

jobs:
  push:
    name: "yolks:java_${{ matrix.tag }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        tag:
          - 8
          - 8j9
          - 11
          - 11j9
          - 16
          - 16j9
          - 17
          - 17j9
          - 18
          - 18j9
          - 19
          - 19j9
          - 21
          - 22
          - 23
          - 24
          - 25
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
        with:
            image: tonistiigi/binfmt:qemu-v7.0.0-28
      - uses: docker/setup-buildx-action@v3
        with:
          buildkitd-flags: --debug
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6 # Fix 3: Upgraded to v6 to prevent deprecation warnings
        with:
          context: ./java
          file: ./java/${{ matrix.tag }}/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          # Fix 2: Changed hardcoded 'pterodactyl' namespace to dynamic owner
          tags: |
            ghcr.io/${{ github.repository_owner }}/yolks:java_${{ matrix.tag }}
