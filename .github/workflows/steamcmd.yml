name: build steamcmd
on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * 1"
  push:
    branches:
      - main
      - master
    paths:
      - steamcmd/**

permissions:
  contents: read
  packages: write

jobs:
  push:
    name: "steamcmd:${{ matrix.distro }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        distro:
          - debian
          - ubuntu
          - ubuntu_24.04
          - dotnet
          - proton
          - proton_8
          - sniper
    steps:
      - uses: actions/checkout@v4
      
      - uses: docker/setup-buildx-action@v3
        with:
          buildkitd-flags: --debug
          
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Downcase repository owner
        id: string
        run: echo "owner=${OWNER,,}" >> $GITHUB_OUTPUT
        env:
          OWNER: ${{ github.repository_owner }}

      - uses: docker/build-push-action@v6 
        with:
          context: ./steamcmd
          file: ./steamcmd/${{ matrix.distro }}/Dockerfile
          platforms: linux/amd64
          push: true
          # This line below dynamically replaces 'ptero-eggs' with 'osprey-team'
          tags: |
            ghcr.io/${{ github.repository_owner }}/steamcmd:${{ matrix.distro }}
