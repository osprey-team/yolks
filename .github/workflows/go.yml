name: build go
on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 1 * *"
  push:
    branches:
      - master
    paths:
      - go/**

# Fix 1: Explicitly grant write access to GitHub Packages
permissions:
  contents: read
  packages: write

jobs:
  push:
    name: "yolks:go_${{ matrix.tag }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        tag:
          - "1.14"
          - "1.15"
          - "1.16"
          - "1.17"
          - "1.18"
          - "1.19"
          - "1.20"
          - "1.21"
          - "1.22"
          - "1.23"
          - "1.24"
          - "1.25"
          - "1.26"
    steps:
      - uses: actions/checkout@v4 # Note: v4 is the current recommended stable version
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
        with:
          buildkitd-flags: --debug
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          # Fix 2: Changed hardcoded 'pterodactyl' namespace to dynamic owner
          images: ghcr.io/${{ github.repository_owner }}/yolks
          tags: |
            type=raw,value=go_${{ matrix.tag }}
            type=raw,value=go_latest,enable=${{ matrix.tag == '1.26' }}
      - uses: docker/build-push-action@v6 # Note: v6 is the recommended stable version
        with:
          context: ./go
          file: ./go/${{ matrix.tag }}/Dockerfile
          platforms: linux/amd64, linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
