name: build games
on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 1 * *"
  push:
    branches:
      - master
    paths:
      - games/**

permissions:
  contents: read
  packages: write

jobs:
  push:
    name: "games:${{ matrix.game }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        game:
          - source
          - rust
          - hytale
          - conan_exiles
    steps:
      - uses: actions/checkout@v4
      
      - uses: docker/setup-buildx-action@v3
        with:
          buildkitd-flags: --debug
          
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Fix: Automatically convert the owner name to lowercase
      - name: Downcase repository owner
        id: string
        run: |
          echo "owner=${OWNER,,}" >> $GITHUB_OUTPUT
        env:
          OWNER: ${{ github.repository_owner }}

      - uses: docker/build-push-action@v6
        with:
          context: ./games/${{ matrix.game }}
          file: ./games/${{ matrix.game }}/Dockerfile
          platforms: linux/amd64
          push: true
          # Use the lowercased output step variable here
          tags: |
            ghcr.io/${{ steps.string.outputs.owner }}/games:${{ matrix.game }}
