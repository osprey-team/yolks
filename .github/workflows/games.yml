name: build games
on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 1 * *"
  push:
    branches:
      - master
    paths:
      - games/**

# Fix 1: Explicitly grant write access to GitHub Packages
permissions:
  contents: read
  packages: write

jobs:
  push:
    name: "games:${{ matrix.game }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        game:
          - source
          - rust
          - hytale
          - conan_exiles
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
        with:
          buildkitd-flags: --debug
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6 # Fix 3: Upgraded to v6 to prevent deprecation warnings
        with:
          context: ./games/${{ matrix.game }}
          file: ./games/${{ matrix.game }}/Dockerfile
          platforms: linux/amd64
          push: true
          # Fix 2: Changed hardcoded 'pterodactyl' namespace to dynamic owner
          tags: |
            ghcr.io/${{ github.repository_owner }}/games:${{ matrix.game }}
