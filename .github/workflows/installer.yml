name: build installers
on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 1 * *"
  push:
    branches:
      - master
    paths:
      - installers/**

# Fix 1: Added explicit write permissions for GitHub Packages
permissions:
  contents: read
  packages: write

jobs:
  pushMultiArch:
    name: "yolks:installers_multiarch:${{ matrix.tag }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        tag:
          - alpine
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
        with:
          buildkitd-flags: --debug
      - name: Setup QEMU for multiarch builds
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64,amd64
          image: tonistiigi/binfmt:qemu-v7.0.0-28
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6 # Fix 3: Updated to v6 to clear deprecation
        with:
          context: ./installers
          file: ./installers/${{ matrix.tag }}/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          # Fix 2: Changed hardcoded namespace to dynamic repository owner
          tags: |
            ghcr.io/${{ github.repository_owner }}/installers:${{ matrix.tag }}

  pushAmd:
    name: "yolks:installers_amd:${{ matrix.tag }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        tag:
          - debian
    steps:
      - uses: actions/checkout@v4 # Fix 3: Updated v2 to v4 to clear deprecation
      - uses: docker/setup-buildx-action@v3
        with:
          version: "v0.7.0"
          buildkitd-flags: --debug
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6 # Fix 3: Updated to v6 to clear deprecation
        with:
          context: ./installers
          file: ./installers/${{ matrix.tag }}/Dockerfile
          platforms: linux/amd64
          push: true
          # Fix 2: Changed hardcoded namespace to dynamic repository owner
          tags: |
            ghcr.io/${{ github.repository_owner }}/installers:${{ matrix.tag }}
